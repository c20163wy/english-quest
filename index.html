<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Quest</title>
  <style>
    :root {
      --green: #58cc02;
      --green-dark: #43a802;
      --blue: #1cb0f6;
      --red: #ff4b4b;
      --text: #2f3640;
      --muted: #6b7280;
      --bg: #f7f9fc;
      --card: #ffffff;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
    }

    .mascot {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--green);
      color: white;
      font-size: 24px;
      box-shadow: 0 4px 0 var(--green-dark);
    }

    .streak {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff7ed;
      color: #c2410c;
      font-weight: 700;
      font-size: 14px;
      border: 1px solid #fed7aa;
      white-space: nowrap;
    }

    .screen { display: none; flex: 1; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .hero {
      text-align: center;
      padding: 28px 20px;
      margin-bottom: 14px;
    }

    .hero-icon {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 30px;
      background: linear-gradient(135deg, #58cc02, #1cb0f6);
      display: grid;
      place-items: center;
      font-size: 50px;
      color: white;
      box-shadow: 0 8px 0 rgba(67, 168, 2, 0.5);
    }

    h1, h2, h3 { margin: 0; }

    h1 {
      font-size: 28px;
      line-height: 1.2;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.7;
      margin: 12px 0 20px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
      margin: 18px 4px 10px;
    }

    .lesson-grid { display: grid; gap: 12px; }

    .lesson-card {
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: white;
      cursor: pointer;
      transition: 0.12s;
      text-align: left;
      width: 100%;
      color: var(--text);
    }

    .lesson-card:hover {
      border-color: #bfdbfe;
      background: #eff6ff;
      transform: translateY(-1px);
    }

    .lesson-card strong {
      display: block;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .lesson-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .lesson-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lesson-badge {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 25px;
      background: #dcfce7;
      color: var(--green-dark);
      flex: 0 0 auto;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      background: var(--green);
      color: white;
      box-shadow: 0 5px 0 var(--green-dark);
      transition: transform 0.05s, box-shadow 0.05s, opacity 0.2s;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.secondary {
      background: white;
      color: var(--text);
      border: 2px solid var(--line);
      box-shadow: 0 5px 0 #d1d5db;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 0;
      background: white;
      font-size: 22px;
      color: var(--muted);
      cursor: pointer;
    }

    .progress-wrap {
      flex: 1;
      height: 14px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 999px;
      transition: width 0.3s;
    }

    .quiz-lesson-title {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .question-type {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .question {
      font-size: 22px;
      line-height: 1.55;
      font-weight: 800;
      margin-bottom: 20px;
      word-break: normal;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin: 16px 0 20px;
    }

    .choice {
      border: 2px solid var(--line);
      background: white;
      border-radius: 16px;
      padding: 15px;
      text-align: left;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.12s;
      color: var(--text);
    }

    .choice:hover {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .choice.selected {
      border-color: var(--blue);
      background: #e0f2fe;
    }

    .choice.correct {
      border-color: var(--green);
      background: #dcfce7;
    }

    .choice.wrong {
      border-color: var(--red);
      background: #fee2e2;
    }

    .word-bank, .answer-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 54px;
      padding: 12px;
      border-radius: 16px;
      background: #f3f4f6;
      border: 2px dashed #d1d5db;
      margin-bottom: 14px;
    }

    .word {
      padding: 10px 12px;
      background: white;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #d1d5db;
      color: var(--text);
    }

    .word:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #d1d5db;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin: -4px 0 8px;
      line-height: 1.5;
    }

    .hint-area {
      margin: 4px 0 16px;
    }

    .hint-btn {
      width: auto;
      border: 2px solid #fde68a;
      border-radius: 999px;
      padding: 9px 13px;
      background: #fffbeb;
      color: #92400e;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 3px 0 #facc15;
    }

    .hint-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #facc15;
    }

    .hint-box {
      display: none;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #78350f;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
    }

    .hint-box.show {
      display: block;
    }

    .feedback {
      position: sticky;
      bottom: 0;
      margin: 18px -16px -16px;
      padding: 16px;
      border-radius: 24px 24px 0 0;
      background: white;
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 20px rgba(15, 23, 42, 0.08);
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct {
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .feedback.wrong {
      background: #fee2e2;
      border-color: #fecaca;
    }

    .feedback-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .feedback-text {
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .result { text-align: center; }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 14px auto 18px;
      background: #dcfce7;
      border: 10px solid var(--green);
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 900;
      color: var(--green-dark);
    }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: #f9fafb;
      border: 1px solid var(--line);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-weight: 900;
      font-size: 22px;
    }

    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
    }

    .history-item strong { color: var(--text); }

    footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <div class="mascot">🦉</div>
        <div>
          <div>English Quest</div>
          <div style="font-size:12px;color:#6b7280;font-weight:600;">1日3分の授業復習</div>
        </div>
      </div>
      <div class="streak">🔥 <span id="streakCount">0</span>日</div>
    </header>

    <main id="home" class="screen active">
      <section class="card hero">
        <div class="hero-icon">📚</div>
        <h1>English Quest</h1>
        <p class="subtitle">
          まずは問題タイプを選ぼう。<br>
          出題数とLessonを選んで復習。
        </p>
      </section>

      <div class="section-title">問題タイプを選択</div>
      <section id="modeList" class="lesson-grid"></section>

      <div class="section-title">学習履歴</div>
      <section class="lesson-card">
        <div id="historyList" class="lesson-meta">まだ記録がありません。</div>
      </section>
    </main>

    <main id="questionCountSelect" class="screen">
      <div class="topbar">
        <button class="close-btn" onclick="goHome()">×</button>
        <div style="flex:1;">
          <div style="font-weight:900;font-size:18px;">出題数を選択</div>
          <div id="selectedModeOnlyText" style="font-size:13px;color:#6b7280;font-weight:700;"></div>
        </div>
      </div>

      <section id="questionCountList" class="lesson-grid"></section>
    </main>

    <main id="lessonSelect" class="screen">
      <div class="topbar">
        <button class="close-btn" onclick="goHome()">×</button>
        <div style="flex:1;">
          <div style="font-weight:900;font-size:18px;">Lessonを選択</div>
          <div id="selectedModeText" style="font-size:13px;color:#6b7280;font-weight:700;"></div>
        </div>
      </div>

      <section id="lessonList" class="lesson-grid"></section>
    </main>

    <main id="quiz" class="screen">
      <div class="topbar">
        <button class="close-btn" onclick="backToLessonSelect()">×</button>
        <div class="progress-wrap">
          <div id="progress" class="progress"></div>
        </div>
        <div id="quizLessonTitle" class="quiz-lesson-title"></div>
      </div>

      <section class="card">
        <div id="questionType" class="question-type">単語</div>
        <div id="questionText" class="question"></div>

        <div class="hint-area">
          <button id="hintBtn" class="hint-btn" type="button" onclick="showHint()">💡 ヒント</button>
          <div id="hintBox" class="hint-box"></div>
        </div>

        <div id="choiceArea" class="choices"></div>

        <div id="wordOrderArea" style="display:none;">
          <div style="font-weight:800;margin-bottom:8px;">答え</div>
          <div id="answerBank" class="answer-bank"></div>
          <div style="font-weight:800;margin-bottom:8px;">語群</div>
          <div class="note">※ヒントにならないよう、大文字・ピリオドは消しています。</div>
          <div id="wordBank" class="word-bank"></div>
          <button class="btn secondary" onclick="clearWordOrder()">やり直す</button>
        </div>

        <button id="checkBtn" class="btn" onclick="checkAnswer()" disabled>答え合わせ</button>
      </section>

      <section id="feedback" class="feedback">
        <div id="feedbackTitle" class="feedback-title"></div>
        <div id="feedbackText" class="feedback-text"></div>
        <button class="btn" onclick="nextQuestion()">次へ</button>
      </section>
    </main>

    <main id="result" class="screen">
      <section class="card result">
        <div class="hero-icon">🎉</div>
        <h2>Quest Clear!</h2>
        <p id="resultLessonText" class="subtitle">今日の復習、おつかれさま。</p>
        <div id="scoreCircle" class="score-circle">0/5</div>

        <div class="result-stats">
          <div class="stat">
            <div class="stat-label">正解数</div>
            <div id="correctStat" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">連続学習</div>
            <div id="streakStat" class="stat-value">0日</div>
          </div>
        </div>

        <button class="btn" onclick="restartCurrentLesson()">同じ条件でもう一度</button>
        <div style="height:12px;"></div>
        <button class="btn secondary" onclick="backToLessonSelect()">Lesson選択へ</button>
      </section>
    </main>

    <footer>
      Prototype for class review. 問題はあとから追加できます。
    </footer>
  </div>

<script>
const modes = {
  grammar: {
    title: "文法",
    icon: "🧩",
    theme: "文法問題のみ",
    description: "Lesson 3は使役動詞、Lesson 4は受け身と by / in の使い分けだけを復習します。"
  },
  reading: {
    title: "本文",
    icon: "📖",
    theme: "本文問題のみ",
    description: "単元テストの読解問題に近い本文内容確認です。"
  },
  mixed: {
    title: "総合問題",
    icon: "🎯",
    theme: "ごちゃまぜ",
    description: "単語・文法・表現・本文内容をランダムに復習します。"
  }
};

const questionCounts = {
  5: {
    title: "5問",
    icon: "⚡",
    theme: "サクッと復習",
    description: "短時間で確認したいとき用。朝・休み時間にもやりやすい。"
  },
  10: {
    title: "10問",
    icon: "🔥",
    theme: "しっかり復習",
    description: "考査前や弱点つぶし用。問題数多めで定着を狙う。"
  }
};

const lessons = {
  lesson3: {
    title: "Lesson 3",
    icon: "👕",
    theme: "Why do we wear clothes? / Causative Verbs",
    description: "服の役割、ファッション、使役動詞 let / have / make を復習します。",
    questions: [
      // Vocabulary
      { type: "単語", mode: "choice", q: "「気候」を表す英語は？", choices: ["climate", "culture", "costume", "cookie"], answer: "climate", explanation: "climate は「気候」です。" },
      { type: "単語", mode: "choice", q: "「厳しい」を表す英語は？", choices: ["harsh", "hot", "honest", "happy"], answer: "harsh", explanation: "harsh は「厳しい」という意味です。" },
      { type: "単語", mode: "choice", q: "「反映する」を表す英語は？", choices: ["reflect", "protect", "express", "pursue"], answer: "reflect", explanation: "reflect は「反映する」です。" },
      { type: "単語", mode: "choice", q: "「生活様式」を表す英語は？", choices: ["lifestyle", "stereotype", "garment", "climate"], answer: "lifestyle", explanation: "lifestyle は「生活様式」です。" },
      { type: "単語", mode: "choice", q: "「表現する」を表す英語は？", choices: ["express", "protect", "reflect", "wear"], answer: "express", explanation: "express は「表現する」です。" },
      { type: "単語", mode: "choice", q: "「追い求める」を表す英語は？", choices: ["pursue", "protect", "produce", "prefer"], answer: "pursue", explanation: "pursue は「追い求める」です。" },
      { type: "単語", mode: "choice", q: "「本当に、心から」を表す英語は？", choices: ["genuinely", "recently", "rapidly", "honestly"], answer: "genuinely", explanation: "genuinely は「本当に、心から」という意味です。" },
      { type: "単語", mode: "choice", q: "「衣服」を表す英語は？", choices: ["garment", "nutrient", "livestock", "astronaut"], answer: "garment", explanation: "garment は「衣服」です。" },
      { type: "単語", mode: "choice", q: "「固定観念」を表す英語は？", choices: ["stereotype", "expression", "environment", "lifestyle"], answer: "stereotype", explanation: "stereotype は「固定観念、決めつけ」です。" },
      { type: "単語", mode: "choice", q: "「受け入れられる」を表す英語は？", choices: ["acceptable", "comfortable", "traditional", "intense"], answer: "acceptable", explanation: "acceptable は「受け入れられる」という意味です。" },

      // Grammar choice
      { type: "文法", mode: "choice", q: "「母は私に夕食を作らせてくれた。」に合う英文は？", choices: ["My mother let me cook dinner.", "My mother let me to cook dinner.", "My mother made me to cook dinner.", "My mother had I cook dinner."], answer: "My mother let me cook dinner.", explanation: "let + 人 + 動詞の原形。許可・させてあげるイメージです。" },
      { type: "文法", mode: "choice", q: "「私は兄にパソコンを直してもらった。」に合う英文は？", choices: ["I had my brother fix my computer.", "I let my brother to fix my computer.", "I made my brother fixed my computer.", "I had my brother to fix my computer."], answer: "I had my brother fix my computer.", explanation: "have + 人 + 動詞の原形。お願い・役割としてやってもらうイメージです。" },
      { type: "文法", mode: "choice", q: "「先生は私たちに机を運ばせた。」に合う英文は？", choices: ["The teacher made us carry the desks.", "The teacher let us to carry the desks.", "The teacher had we carry the desks.", "The teacher made us carried the desks."], answer: "The teacher made us carry the desks.", explanation: "make + 人 + 動詞の原形。強めに「させる」イメージです。" },
      { type: "文法", mode: "choice", q: "The news made me ___ sad.", choices: ["feel", "feels", "to feel", "felt"], answer: "feel", explanation: "make + 人 + feel + 形容詞。「人を〜な気持ちにさせる」です。" },
      { type: "文法", mode: "choice", q: "This shirt makes me ___ comfortable.", choices: ["feel", "feels", "to feel", "feeling"], answer: "feel", explanation: "makes me feel comfortable で「私を快適な気持ちにさせる」です。" },
      { type: "文法", mode: "choice", q: "She let Kevin ___ the dishes.", choices: ["wash", "washes", "to wash", "washed"], answer: "wash", explanation: "let Kevin wash ... のように、let の後は人 + 動詞の原形です。" },
      { type: "文法", mode: "choice", q: "I had Satoshi ___ copies.", choices: ["take", "takes", "to take", "taken"], answer: "take", explanation: "have Satoshi take copies で「サトシにコピーを取ってもらった」です。" },
      { type: "文法", mode: "choice", q: "She made Ken ___ hard.", choices: ["study", "studies", "to study", "studied"], answer: "study", explanation: "make Ken study で「ケンに勉強をやらせた」です。" },
      { type: "文法", mode: "choice", q: "The smell made me feel ___.", choices: ["bad", "badly", "worse", "worstly"], answer: "bad", explanation: "feel の後ろは形容詞。feel bad で「嫌な気分になる」です。" },
      { type: "文法", mode: "choice", q: "The sari makes the wearer ___ cooler.", choices: ["feel", "feels", "to feel", "felt"], answer: "feel", explanation: "本文型の make + 人 + 動詞の原形です。" },
      { type: "文法", mode: "choice", q: "Boys can wear a skirt if it makes them ___ more comfortable.", choices: ["feel", "feels", "to feel", "feeling"], answer: "feel", explanation: "makes them feel more comfortable で「彼らをより心地よく感じさせる」です。" },
      { type: "表現", mode: "choice", q: "We don’t always have ___ common stereotypes.", choices: ["to follow", "follow", "following", "followed"], answer: "to follow", explanation: "have to + 動詞の原形。don’t have to は「〜する必要はない」です。" },
      { type: "表現", mode: "choice", q: "Fashion is an expression ___ the way we live.", choices: ["of", "by", "with", "at"], answer: "of", explanation: "an expression of ... で「〜の表現」です。" },
      { type: "表現", mode: "choice", q: "Traditional clothing reflects local climates ___ lifestyles.", choices: ["and", "but", "because", "if"], answer: "and", explanation: "local climates and lifestyles で「地域の気候と生活様式」です。" },

      // Grammar word order
      { type: "文法", mode: "word_order", q: "「父は私に車を洗わせた。」となるように並べ替えよう。", words: ["my", "father", "made", "me", "wash", "the", "car"], answer: "My father made me wash the car.", explanation: "made me wash がポイントです。" },

let currentMode = "mixed";
let currentQuestionCount = 5;
let currentLessonId = "lesson3";
let quizQuestions = [];
let current = 0;
let score = 0;
let selected = null;
let answerWords = [];
let usedIndexes = [];

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function renderModes() {
  const box = document.getElementById("modeList");
  box.innerHTML = "";
  Object.entries(modes).forEach(([id, mode]) => {
    const card = document.createElement("button");
    card.className = "lesson-card";
    card.type = "button";
    card.onclick = () => chooseMode(id);
    card.innerHTML = `
      <div class="lesson-row">
        <div class="lesson-badge">${mode.icon}</div>
        <div>
          <strong>${mode.title}</strong>
          <div class="lesson-meta">${mode.theme}<br>${mode.description}</div>
        </div>
      </div>
    `;
    box.appendChild(card);
  });
}

function chooseMode(modeId) {
  currentMode = modeId;
  document.getElementById("selectedModeOnlyText").textContent = `${modes[currentMode].title}：${modes[currentMode].theme}`;
  renderQuestionCounts();
  showScreen("questionCountSelect");
}

function renderQuestionCounts() {
  const box = document.getElementById("questionCountList");
  box.innerHTML = "";
  Object.entries(questionCounts).forEach(([count, setting]) => {
    const card = document.createElement("button");
    card.className = "lesson-card";
    card.type = "button";
    card.onclick = () => chooseQuestionCount(Number(count));
    card.innerHTML = `
      <div class="lesson-row">
        <div class="lesson-badge">${setting.icon}</div>
        <div>
          <strong>${setting.title}</strong>
          <div class="lesson-meta">${setting.theme}<br>${setting.description}</div>
        </div>
      </div>
    `;
    box.appendChild(card);
  });
}

function chooseQuestionCount(count) {
  currentQuestionCount = count;
  document.getElementById("selectedModeText").textContent = `${modes[currentMode].title} / ${currentQuestionCount}問`;
  renderLessons();
  showScreen("lessonSelect");
}

function getQuestionsForMode(lesson) {
  if (currentMode === "grammar") {
    return lesson.questions.filter(q => q.type === "文法");
  }
  if (currentMode === "reading") {
    return lesson.questions.filter(q => q.type === "本文内容");
  }
  return lesson.questions;
}

function renderLessons() {
  const box = document.getElementById("lessonList");
  box.innerHTML = "";
  Object.entries(lessons).forEach(([id, lesson]) => {
    const availableCount = getQuestionsForMode(lesson).length;
    const card = document.createElement("button");
    card.className = "lesson-card";
    card.type = "button";
    card.onclick = () => startLesson(id);
    card.innerHTML = `
      <div class="lesson-row">
        <div class="lesson-badge">${lesson.icon}</div>
        <div>
          <strong>${lesson.title}</strong>
          <div class="lesson-meta">${lesson.theme}<br>${lesson.description}<br>出題対象：${availableCount}問 / 今回：${Math.min(currentQuestionCount, availableCount)}問</div>
        </div>
      </div>
    `;
    box.appendChild(card);
  });
}

function loadStats() {
  const streak = Number(localStorage.getItem("eq_streak") || "0");
  document.getElementById("streakCount").textContent = streak;
  renderHistory();
}

function updateStreak() {
  const today = todayKey();
  const last = localStorage.getItem("eq_lastStudy");
  let streak = Number(localStorage.getItem("eq_streak") || "0");

  if (last !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = yesterday.getFullYear() + "-" + String(yesterday.getMonth()+1).padStart(2,"0") + "-" + String(yesterday.getDate()).padStart(2,"0");
    streak = (last === yKey) ? streak + 1 : 1;
    localStorage.setItem("eq_streak", String(streak));
    localStorage.setItem("eq_lastStudy", today);
  }

  document.getElementById("streakCount").textContent = localStorage.getItem("eq_streak") || "0";
}

function saveHistory(correct, total) {
  const history = JSON.parse(localStorage.getItem("eq_history") || "[]");
  const lesson = lessons[currentLessonId];
  history.unshift({
    date: todayKey(),
    lesson: lesson.title,
    mode: modes[currentMode].title,
    count: total,
    correct,
    total
  });
  localStorage.setItem("eq_history", JSON.stringify(history.slice(0, 8)));
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("eq_history") || "[]");
  const box = document.getElementById("historyList");
  if (!history.length) {
    box.textContent = "まだ記録がありません。";
    return;
  }
  box.innerHTML = history.map(item => `
    <div class="history-item">
      <span>${item.date} / ${item.lesson || "Lesson"} / ${item.mode || "総合問題"} / ${item.count || item.total || 5}問</span>
      <strong>${item.correct}/${item.total}</strong>
    </div>
  `).join("");
}

function startLesson(lessonId) {
  currentLessonId = lessonId;
  const lesson = lessons[currentLessonId];
  const questionSource = getQuestionsForMode(lesson);
  quizQuestions = shuffle(questionSource).slice(0, currentQuestionCount).map(q => ({...q}));
  current = 0;
  score = 0;
  document.getElementById("quizLessonTitle").textContent = `${lesson.title} / ${modes[currentMode].title} / ${quizQuestions.length}問`;
  showScreen("quiz");
  renderQuestion();
}

function restartCurrentLesson() {
  startLesson(currentLessonId);
}

function goHome() {
  showScreen("home");
  loadStats();
}

function backToLessonSelect() {
  renderLessons();
  showScreen("lessonSelect");
}

function renderQuestion() {
  const q = quizQuestions[current];
  selected = null;
  answerWords = [];
  usedIndexes = [];

  document.getElementById("feedback").className = "feedback";
  document.getElementById("checkBtn").disabled = true;
  document.getElementById("hintBox").className = "hint-box";
  document.getElementById("hintBox").textContent = "";
  document.getElementById("hintBtn").disabled = false;
  document.getElementById("progress").style.width = `${(current / quizQuestions.length) * 100}%`;
  document.getElementById("questionType").textContent = q.type;
  document.getElementById("questionText").textContent = q.q;

  const choiceArea = document.getElementById("choiceArea");
  const wordOrderArea = document.getElementById("wordOrderArea");

  if (q.mode === "choice") {
    choiceArea.style.display = "grid";
    wordOrderArea.style.display = "none";
    choiceArea.innerHTML = "";

    shuffle(q.choices).forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.type = "button";
      btn.textContent = choice;
      btn.onclick = () => selectChoice(btn, choice);
      choiceArea.appendChild(btn);
    });
  } else {
    choiceArea.style.display = "none";
    wordOrderArea.style.display = "block";
    q.shuffledWords = shuffle(q.words.map((w, i) => ({w, i})));
    renderWordOrder();
  }
}

function selectChoice(btn, value) {
  selected = value;
  document.querySelectorAll(".choice").forEach(c => c.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("checkBtn").disabled = false;
}

function renderWordOrder() {
  const q = quizQuestions[current];

  document.getElementById("answerBank").innerHTML = "";
  answerWords.forEach((item, idx) => {
    const btn = document.createElement("button");
    btn.className = "word";
    btn.type = "button";
    btn.textContent = item.w;
    btn.onclick = () => removeWord(idx);
    document.getElementById("answerBank").appendChild(btn);
  });

  document.getElementById("wordBank").innerHTML = "";
  q.shuffledWords.forEach(item => {
    if (usedIndexes.includes(item.i)) return;
    const btn = document.createElement("button");
    btn.className = "word";
    btn.type = "button";
    btn.textContent = item.w;
    btn.onclick = () => addWord(item.i);
    document.getElementById("wordBank").appendChild(btn);
  });

  document.getElementById("checkBtn").disabled = answerWords.length !== q.words.length;
}

function addWord(originalIndex) {
  const q = quizQuestions[current];
  const item = q.words.map((w, i) => ({w, i})).find(x => x.i === originalIndex);
  answerWords.push(item);
  usedIndexes.push(originalIndex);
  renderWordOrder();
}

function removeWord(answerIndex) {
  const removed = answerWords.splice(answerIndex, 1)[0];
  usedIndexes = usedIndexes.filter(i => i !== removed.i);
  renderWordOrder();
}

function clearWordOrder() {
  answerWords = [];
  usedIndexes = [];
  renderWordOrder();
}

function normalize(text) {
  return text
    .toLowerCase()
    .replace(/[.!?]+$/g, "")
    .replace(/[,.]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

  if (text.includes("この公園は多くの子どもたちに使われている")) return "公園が主語なので受け身。This park は単数だから be動詞にも注意。";
  if (text.includes("They are cooked in soy sauce")) return "They are cooked と are called が並んでいる。主語 They に合う be動詞を選ぶ。";
  if (text.includes("Insects can")) return "can の後ろは必ず動詞の原形。受け身なら can be + 過去分詞。";
  if (text.includes("About one hundred crickets")) return "one bowl のために使われる、という意味。本文表現として覚えておこう。";
  if (text.includes("Mealworms use much")) return "than があるので比較級。water は不可算名詞なので fewer ではなく別の語。";

  // Natural active/passive
  if (text.includes("学校パンフレットで体育館")) return "紹介したい主役は『体育館』。体育館を主語にすると自然。";
  if (text.includes("サッカーというスポーツ")) return "説明したい主役は『サッカー』。世界中でプレーされる、という受け身が自然。";
  if (text.includes("生徒たちが体育館を使って")) return "今回は主役が『生徒たちの活動』。受け身より Many students を主語にする。";
  if (text.includes("観光客の動き")) return "動いている主役は観光客。Many tourists を主語にした能動態が自然。";
  if (text.includes("ONE PIECEという漫画")) return "紹介したい主役は作品名。作品を主語にして『書かれている』にする。";

  // Lesson 4 correction
  if (text.includes("This room is clean by students")) return "clean はこのままだと形容詞/原形。受け身にするには過去分詞にする。";
  if (text.includes("Many flowers is grown")) return "主語 Many flowers は複数。be動詞を単数形にしない。";
  if (text.includes("This window was break")) return "was の後ろは過去分詞。break の過去分詞は不規則変化。";
  if (text.includes("This letter is wrote")) return "is の後ろは過去分詞。write の過去分詞を思い出そう。";

  // Lesson 4 word order
  if (text.includes("この漫画は英語で書かれている")) return "This manga が主語。is written の後ろに、言語を表す in English。";
  if (text.includes("この窓はケンによって壊された")) return "This window → was broken → by Ken の順番。";
  if (text.includes("韓国語は韓国で話されている")) return "Korean が主語。is spoken の後ろに場所を表す in Korea。";
  if (text.includes("この本は佐々木先生")) return "This book が主語。was written の後ろに by Mr. Sasaki。";
  if (text.includes("コオロギで作られているのですか")) return "疑問文なので Are they ... ? から始まる。made with crickets はまとまり。";
  if (text.includes("家畜よりも効率的")) return "主語は insects。can be raised の後ろに比較の more efficiently than ...。";

  // Lesson 3 reading
  if (text.includes("服を着る理由として最初")) return "本文の最初の Why do we wear clothes? の直後を思い出そう。気候や暑さの話。";
  if (text.includes("Khanty people はどこの")) return "Khanty people の直後に地名が2つ出てくる。Siberia と国名。";
  if (text.includes("Khanty people の winter coats")) return "winter coats made of ... の部分。寒い地域らしい素材。";
  if (text.includes("winter coats を着る目的")) return "to keep themselves warm in their harsh environment の部分を見る。";
  if (text.includes("sari はどこの")) return "The sari, traditional clothing of ... の国名を思い出そう。";
  if (text.includes("sari は着る人を")) return "makes the wearer feel ... の後ろ。暑い天気でどう感じるか。";
  if (text.includes("Traditional clothing は何を反映")) return "reflects の後ろに2つ並んでいる。local で始まるセット。";
  if (text.includes("服を着るもう1つの理由")) return "More recently we have another reason... の次の文。fashion がキーワード。";
  if (text.includes("fashion は何の表現")) return "an expression of ... の後ろの4語。way が入る表現。";
  if (text.includes("boys can wear a skirt")) return "理由は if の後ろ。本人がどう感じるならOKなのか。";
  if (text.includes("girls について")) return "girls can wear ... ではなく、It is acceptable for girls to wear ... の部分。";
  if (text.includes("Lesson 3全体のテーマ")) return "前半は伝統衣装と気候、後半はファッションと自分らしさ。この2つを含む選択肢を探す。";

  // Lesson 4 reading
  if (text.includes("Sam が Mana に持ってきた")) return "本文の最初の Sam のセリフ。Mana に試してほしいと言っているもの。";
  if (text.includes("最初、cricket cookies")) return "Mana の最初の反応。That sounds ... の一語。";
  if (text.includes("cricket cookies について Sam")) return "Sam は味と栄養の2点を説明している。especially の後ろも大事。";
  if (text.includes("食べた後の反応")) return "Mana は完全に好きになったわけではない。all right という控えめな反応。";
  if (text.includes("日本の一部地域")) return "such as の後ろに出てくる昆虫。日本の佃煮の話。";
  if (text.includes("grasshoppers は何で")) return "They are cooked in ... and are called ... の2つを押さえる。";
  if (text.includes("insects を食べることについて")) return "Mana は edible とは認めているが、自分ではどう感じているか。";
  if (text.includes("Some people dislike")) return "だから、虫の姿がそのままではない食べ物がよい、という流れ。";
  if (text.includes("宇宙で何になる")) return "food ___ in space の表現。食料の供給源という意味。";
  if (text.includes("astronauts")) return "宇宙では地球から持っていくだけではなく、自分たちで何をする必要があるか。";
  if (text.includes("昆虫のよい点")) return "rapidly と steadily の2語がヒント。増える速さと生産の安定性。";
  if (text.includes("Insect farming")) return "Mana が I see. のあとに言っていること。space の量に注目。";
  if (text.includes("Mealworms と beef")) return "比較表現 much less water than beef。more と less を取り違えない。";
  if (text.includes("何を節約")) return "conserve の直後の名詞。昆虫を食べることで節約できるもの。";
  if (text.includes("local restaurant")) return "cricket cookies ではなく、地元のレストランが出している料理。";
  if (text.includes("one bowl of cricket ramen")) return "About one hundred ... の数字。10でも1000でもない。";
  if (text.includes("最後に Mana")) return "I’m not adventurous, but ... の後半。完全拒否ではない。";
  if (text.includes("Lesson 4全体のテーマ")) return "Part 1は抵抗感、Part 2は宇宙食・未来の食料。この両方をまとめる選択肢。";

  // General fallback, but still a bit more useful
  if (q.mode === "word_order") {
    return "まず主語を置き、その後ろに動詞のまとまりを作ろう。日本語の『誰が／何が』と『どうする』を分けて考える。";
  }

  if (q.type === "文法" && currentLessonId === "lesson3") {
    return "使役動詞のどれを使うかを先に決めよう。let は許可、have は依頼、make は強制寄り。";
  }

  if (q.type === "文法" && currentLessonId === "lesson4") {
    return "主語が『する側』か『される側』かを確認しよう。される側なら be動詞 + 過去分詞。";
  }

  if (q.type === "本文内容") {
    return "問題文のキーワードを本文のどの場面で見たか思い出そう。前半か後半かを分けると探しやすい。";
  }

  return "選択肢をすぐ選ばず、問題文のキーワードが本文・プリントのどこで出てきたか思い出そう。";
}

function showHint() {
  const q = quizQuestions[current];
  const box = document.getElementById("hintBox");
  box.textContent = getHint(q);
  box.className = "hint-box show";
}

function checkAnswer() {
  const q = quizQuestions[current];
  let userAnswer = "";

  if (q.mode === "choice") {
    userAnswer = selected;
  } else {
    userAnswer = answerWords.map(x => x.w).join(" ");
  }

  const isCorrect = normalize(userAnswer) === normalize(q.answer);
  if (isCorrect) score++;

  if (q.mode === "choice") {
    document.querySelectorAll(".choice").forEach(btn => {
      if (btn.textContent === q.answer) btn.classList.add("correct");
      if (btn.textContent === userAnswer && !isCorrect) btn.classList.add("wrong");
      btn.disabled = true;
    });
  }

  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (isCorrect ? "correct" : "wrong");
  document.getElementById("feedbackTitle").textContent = isCorrect ? "正解！" : "惜しい！";
  document.getElementById("feedbackText").innerHTML = isCorrect
    ? q.explanation
    : `正解：<strong>${q.answer}</strong><br>${q.explanation}`;

  document.getElementById("checkBtn").disabled = true;
  document.getElementById("hintBtn").disabled = true;
}

function nextQuestion() {
  current++;
  if (current >= quizQuestions.length) {
    finishLesson();
  } else {
    renderQuestion();
  }
}

function finishLesson() {
  updateStreak();
  saveHistory(score, quizQuestions.length);

  const lesson = lessons[currentLessonId];
  document.getElementById("progress").style.width = "100%";
  document.getElementById("resultLessonText").textContent = `${lesson.title} / ${modes[currentMode].title} / ${quizQuestions.length}問 の復習、おつかれさま。`;
  document.getElementById("scoreCircle").textContent = `${score}/${quizQuestions.length}`;
  document.getElementById("correctStat").textContent = `${score}問`;
  document.getElementById("streakStat").textContent = `${localStorage.getItem("eq_streak") || "0"}日`;
  showScreen("result");
}

renderModes();
loadStats();
</script>
