<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Quest</title>
  <style>
    :root {
      --green: #58cc02;
      --green-dark: #43a802;
      --blue: #1cb0f6;
      --red: #ff4b4b;
      --text: #2f3640;
      --muted: #6b7280;
      --bg: #f7f9fc;
      --card: #ffffff;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
    }

    .mascot {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--green);
      color: white;
      font-size: 24px;
      box-shadow: 0 4px 0 var(--green-dark);
    }

    .streak {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff7ed;
      color: #c2410c;
      font-weight: 700;
      font-size: 14px;
      border: 1px solid #fed7aa;
      white-space: nowrap;
    }

    .screen { display: none; flex: 1; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .hero {
      text-align: center;
      padding: 28px 20px;
      margin-bottom: 14px;
    }

    .hero-icon {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 30px;
      background: linear-gradient(135deg, #58cc02, #1cb0f6);
      display: grid;
      place-items: center;
      font-size: 50px;
      color: white;
      box-shadow: 0 8px 0 rgba(67, 168, 2, 0.5);
    }

    h1, h2, h3 { margin: 0; }

    h1 {
      font-size: 28px;
      line-height: 1.2;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.7;
      margin: 12px 0 20px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
      margin: 18px 4px 10px;
    }

    .lesson-grid { display: grid; gap: 12px; }

    .lesson-card {
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: white;
      cursor: pointer;
      transition: 0.12s;
      text-align: left;
      width: 100%;
      color: var(--text);
    }

    .lesson-card:hover {
      border-color: #bfdbfe;
      background: #eff6ff;
      transform: translateY(-1px);
    }

    .lesson-card strong {
      display: block;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .lesson-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .lesson-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lesson-badge {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 25px;
      background: #dcfce7;
      color: var(--green-dark);
      flex: 0 0 auto;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      background: var(--green);
      color: white;
      box-shadow: 0 5px 0 var(--green-dark);
      transition: transform 0.05s, box-shadow 0.05s, opacity 0.2s;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.secondary {
      background: white;
      color: var(--text);
      border: 2px solid var(--line);
      box-shadow: 0 5px 0 #d1d5db;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 0;
      background: white;
      font-size: 22px;
      color: var(--muted);
      cursor: pointer;
    }

    .progress-wrap {
      flex: 1;
      height: 14px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 999px;
      transition: width 0.3s;
    }

    .quiz-lesson-title {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .question-type {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .question {
      font-size: 22px;
      line-height: 1.55;
      font-weight: 800;
      margin-bottom: 20px;
      word-break: normal;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin: 16px 0 20px;
    }

    .choice {
      border: 2px solid var(--line);
      background: white;
      border-radius: 16px;
      padding: 15px;
      text-align: left;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.12s;
      color: var(--text);
    }

    .choice:hover {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .choice.selected {
      border-color: var(--blue);
      background: #e0f2fe;
    }

    .choice.correct {
      border-color: var(--green);
      background: #dcfce7;
    }

    .choice.wrong {
      border-color: var(--red);
      background: #fee2e2;
    }

    .word-bank, .answer-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 54px;
      padding: 12px;
      border-radius: 16px;
      background: #f3f4f6;
      border: 2px dashed #d1d5db;
      margin-bottom: 14px;
    }

    .word {
      padding: 10px 12px;
      background: white;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #d1d5db;
      color: var(--text);
    }

    .word:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #d1d5db;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin: -4px 0 8px;
      line-height: 1.5;
    }

    .hint-area {
      margin: 4px 0 16px;
    }

    .hint-btn {
      width: auto;
      border: 2px solid #fde68a;
      border-radius: 999px;
      padding: 9px 13px;
      background: #fffbeb;
      color: #92400e;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 3px 0 #facc15;
    }

    .hint-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #facc15;
    }

    .hint-box {
      display: none;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #78350f;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
    }

    .hint-box.show {
      display: block;
    }

    .feedback {
      position: sticky;
      bottom: 0;
      margin: 18px -16px -16px;
      padding: 16px;
      border-radius: 24px 24px 0 0;
      background: white;
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 20px rgba(15, 23, 42, 0.08);
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct {
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .feedback.wrong {
      background: #fee2e2;
      border-color: #fecaca;
    }

    .feedback-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .feedback-text {
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .result { text-align: center; }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 14px auto 18px;
      background: #dcfce7;
      border: 10px solid var(--green);
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 900;
      color: var(--green-dark);
    }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: #f9fafb;
      border: 1px solid var(--line);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-weight: 900;
      font-size: 22px;
    }

    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
    }

    .history-item strong { color: var(--text); }

    footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <div class="mascot">🦉</div>
        <div>
          <div>English Quest</div>
          <div style="font-size:12px;color:#6b7280;font-weight:600;">1日3分の授業復習</div>
        </div>
      </div>
      <div class="streak">🔥 <span id="streakCount">0</span>日</div>
    </header>

    <main id="home" class="screen active">
      <section class="card hero">
        <div class="hero-icon">📚</div>
        <h1>English Quest</h1>
        <p class="subtitle">
          まずは問題タイプを選ぼう。<br>
          出題数とLessonを選んで復習。
        </p>
      </section>

      <div class="section-title">問題タイプを選択</div>
      <section id="modeList" class="lesson-grid"></section>

      <div class="section-title">学習履歴</div>
      <section class="lesson-card">
        <div id="historyList" class="lesson-meta">まだ記録がありません。</div>
      </section>
    </main>

    <main id="questionCountSelect" class="screen">
      <div class="topbar">
        <button class="close-btn" onclick="goHome()">×</button>
        <div style="flex:1;">
          <div style="font-weight:900;font-size:18px;">出題数を選択</div>
          <div id="selectedModeOnlyText" style="font-size:13px;color:#6b7280;font-weight:700;"></div>
        </div>
      </div>

      <section id="questionCountList" class="lesson-grid"></section>
    </main>

    <main id="lessonSelect" class="screen">
      <div class="topbar">
        <button class="close-btn" onclick="goHome()">×</button>
        <div style="flex:1;">
          <div style="font-weight:900;font-size:18px;">Lessonを選択</div>
          <div id="selectedModeText" style="font-size:13px;color:#6b7280;font-weight:700;"></div>
        </div>
      </div>

      <section id="lessonList" class="lesson-grid"></section>
    </main>

    <main id="quiz" class="screen">
      <div class="topbar">
        <button class="close-btn" onclick="backToLessonSelect()">×</button>
        <div class="progress-wrap">
          <div id="progress" class="progress"></div>
        </div>
        <div id="quizLessonTitle" class="quiz-lesson-title"></div>
      </div>

      <section class="card">
        <div id="questionType" class="question-type">単語</div>
        <div id="questionText" class="question"></div>

        <div class="hint-area">
          <button id="hintBtn" class="hint-btn" type="button" onclick="showHint()">💡 ヒント</button>
          <div id="hintBox" class="hint-box"></div>
        </div>

        <div id="choiceArea" class="choices"></div>

        <div id="wordOrderArea" style="display:none;">
          <div style="font-weight:800;margin-bottom:8px;">答え</div>
          <div id="answerBank" class="answer-bank"></div>
          <div style="font-weight:800;margin-bottom:8px;">語群</div>
          <div class="note">※ヒントにならないよう、大文字・ピリオドは消しています。</div>
          <div id="wordBank" class="word-bank"></div>
          <button class="btn secondary" onclick="clearWordOrder()">やり直す</button>
        </div>

        <button id="checkBtn" class="btn" onclick="checkAnswer()" disabled>答え合わせ</button>
      </section>

      <section id="feedback" class="feedback">
        <div id="feedbackTitle" class="feedback-title"></div>
        <div id="feedbackText" class="feedback-text"></div>
        <button class="btn" onclick="nextQuestion()">次へ</button>
      </section>
    </main>

    <main id="result" class="screen">
      <section class="card result">
        <div class="hero-icon">🎉</div>
        <h2>Quest Clear!</h2>
        <p id="resultLessonText" class="subtitle">今日の復習、おつかれさま。</p>
        <div id="scoreCircle" class="score-circle">0/5</div>

        <div class="result-stats">
          <div class="stat">
            <div class="stat-label">正解数</div>
            <div id="correctStat" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">連続学習</div>
            <div id="streakStat" class="stat-value">0日</div>
          </div>
        </div>

        <button class="btn" onclick="restartCurrentLesson()">同じ条件でもう一度</button>
        <div style="height:12px;"></div>
        <button class="btn secondary" onclick="backToLessonSelect()">Lesson選択へ</button>
      </section>
    </main>

    <footer>
      Prototype for class review. 問題はあとから追加できます。
    </footer>
  </div>

<script>
const modes = {
  vocabulary: {
    title: "単語",
    icon: "🔤",
    theme: "単語問題のみ",
    description: "授業プリントの単語リストから出題します。"
  },
  grammar: {
    title: "文法",
    icon: "🧩",
    theme: "文法問題のみ",
    description: "Lesson 3は使役動詞、Lesson 4は受け身と by / in の使い分けだけを復習します。"
  },
  reading: {
    title: "本文",
    icon: "📖",
    theme: "本文問題のみ",
    description: "単元テストの読解問題に近い本文内容確認です。"
  },
  mixed: {
    title: "総合問題",
    icon: "🎯",
    theme: "ごちゃまぜ",
    description: "単語・文法・表現・本文内容をランダムに復習します。"
  }
};

const questionCounts = {
  5: {
    title: "5問",
    icon: "⚡",
    theme: "サクッと復習",
    description: "短時間で確認したいとき用。朝・休み時間にもやりやすい。"
  },
  10: {
    title: "10問",
    icon: "🔥",
    theme: "しっかり復習",
    description: "考査前や弱点つぶし用。問題数多めで定着を狙う。"
  }
};

const lessons = {
  lesson3: {
    title: "Lesson 3",
    icon: "👕",
    theme: "Why do we wear clothes? / Causative Verbs",
    description: "服の役割、ファッション、使役動詞 let / have / make を復習します。",
    questions: [

      // Added pattern variants: same grammar in multiple formats
      { type: "文法", mode: "word_order", q: "「母は私に夕食を作らせてくれた。」となるように並べ替えよう。", words: ["my", "mother", "let", "me", "cook", "dinner"], answer: "My mother let me cook dinner.", explanation: "let + 人 + 動詞の原形。『させてくれた』なので let を使います。" },
      { type: "文法", mode: "choice", q: "誤りを直すなら？ My mother let me to cook dinner.", choices: ["My mother let me cook dinner.", "My mother made me to cook dinner.", "My mother let I cook dinner.", "My mother had me cooked dinner."], answer: "My mother let me cook dinner.", explanation: "let の後ろは 人 + 動詞の原形。to cook ではなく cook です。" },
      { type: "文法", mode: "choice", q: "My mother let me cook dinner. の意味は？", choices: ["母は私に夕食を作らせてくれた。", "母は私に夕食を作らせた。", "私は母に夕食を作ってもらった。", "母は私を悲しい気持ちにさせた。"], answer: "母は私に夕食を作らせてくれた。", explanation: "let は許可・させてあげるイメージです。" },

      { type: "文法", mode: "word_order", q: "「先生は私たちに机を運ばせた。」となるように並べ替えよう。", words: ["the", "teacher", "made", "us", "carry", "the", "desks"], answer: "The teacher made us carry the desks.", explanation: "make + 人 + 動詞の原形。made us carry の順番です。" },
      { type: "文法", mode: "choice", q: "誤りを直すなら？ The teacher made us to carry the desks.", choices: ["The teacher made us carry the desks.", "The teacher let us to carry the desks.", "The teacher made we carry the desks.", "The teacher had us carried the desks."], answer: "The teacher made us carry the desks.", explanation: "make の後ろは 人 + 動詞の原形。to carry ではなく carry です。" },
      { type: "文法", mode: "choice", q: "The teacher made us carry the desks. の意味は？", choices: ["先生は私たちに机を運ばせた。", "先生は私たちに机を運ばせてくれた。", "先生は私たちに机を運んでもらった。", "先生は机を運ばれた。"], answer: "先生は私たちに机を運ばせた。", explanation: "made は強めの『させた』という意味です。" },

      { type: "文法", mode: "choice", q: "「このジャケットは私をあたたかい気持ちにさせる。」に合う英文は？", choices: ["This jacket makes me feel warm.", "This jacket makes me to feel warm.", "This jacket lets me feel warm.", "This jacket made I feel warm."], answer: "This jacket makes me feel warm.", explanation: "make + 人 + feel + 形容詞の形です。" },
      { type: "文法", mode: "word_order", q: "「このジャケットは私をあたたかい気持ちにさせる。」となるように並べ替えよう。", words: ["this", "jacket", "makes", "me", "feel", "warm"], answer: "This jacket makes me feel warm.", explanation: "makes me feel warm のまとまりを作ります。" },
      { type: "文法", mode: "choice", q: "誤りを直すなら？ This jacket makes me to feel warm.", choices: ["This jacket makes me feel warm.", "This jacket makes I feel warm.", "This jacket lets me to feel warm.", "This jacket had me feel warm."], answer: "This jacket makes me feel warm.", explanation: "make + 人 + feel + 形容詞。to feel にはしません。" },

      { type: "文法", mode: "choice", q: "I had my father move the desk. の意味は？", choices: ["私は父に机を動かしてもらった。", "私は父に机を動かさせてくれた。", "父は私に机を動かさせた。", "私は机に父を動かしてもらった。"], answer: "私は父に机を動かしてもらった。", explanation: "had + 人 + 動詞の原形で『人に〜してもらった』です。" },
      { type: "文法", mode: "choice", q: "「私は父に机を動かしてもらった。」に合う英文は？", choices: ["I had my father move the desk.", "I let my father to move the desk.", "I made my father moved the desk.", "I had my father to move the desk."], answer: "I had my father move the desk.", explanation: "have + 人 + 動詞の原形。move the desk を続けます。" },
      { type: "文法", mode: "word_order", q: "「私は父に机を動かしてもらった。」となるように並べ替えよう。", words: ["i", "had", "my", "father", "move", "the", "desk"], answer: "I had my father move the desk.", explanation: "I had my father move ... の順番です。" },

      // Added vocabulary reverse patterns: English to Japanese
      { type: "単語", mode: "choice", q: "climate の意味は？", choices: ["気候", "衣服", "生活様式", "固定観念"], answer: "気候", explanation: "climate は『気候』です。" },
      { type: "単語", mode: "choice", q: "intense の意味は？", choices: ["激しい、強烈な", "一般的な", "快適な", "受け入れられる"], answer: "激しい、強烈な", explanation: "intense heat で『激しい暑さ』です。" },
      { type: "単語", mode: "choice", q: "ethnic の意味は？", choices: ["民族の、民族的な", "冒険好きな", "効率的な", "食べられる"], answer: "民族の、民族的な", explanation: "ethnic costumes で『民族衣装』です。" },
      { type: "単語", mode: "choice", q: "protect A from B の意味は？", choices: ["AをBから守る", "AをBに反映する", "AをBに従わせる", "AをBとして表現する"], answer: "AをBから守る", explanation: "protect A from B は『AをBから守る』です。" },
      { type: "単語", mode: "choice", q: "reflect の意味は？", choices: ["反映する", "守る", "従う", "追い求める"], answer: "反映する", explanation: "traditional clothing reflects local climates... の reflect です。" },
      { type: "単語", mode: "choice", q: "lifestyle の意味は？", choices: ["生活様式、暮らし方", "固定観念", "内面", "衣服"], answer: "生活様式、暮らし方", explanation: "lifestyle は『生活様式、暮らし方』です。" },

      { type: "文法", mode: "choice", q: "「私は母に服を選んでもらった。」に合う英文は？", choices: ["I had my mother choose my clothes.", "I let my mother to choose my clothes.", "I made my mother chosen my clothes.", "I had my mother to choose my clothes."], answer: "I had my mother choose my clothes.", explanation: "「してもらった」は have。have + 人 + 動詞の原形です。" },

      { type: "文法", mode: "word_order", q: "「この服は私を快適な気持ちにさせる。」となるように並べ替えよう。", words: ["these", "clothes", "make", "me", "feel", "comfortable"], answer: "These clothes make me feel comfortable.", explanation: "make me feel comfortable の型です。" },

      { type: "文法", mode: "choice", q: "「母は私に夕食を作らせてくれた。」に合う英文は？", choices: ["My mother let me cook dinner.", "My mother let me to cook dinner.", "My mother made me to cook dinner.", "My mother had I cook dinner."], answer: "My mother let me cook dinner.", explanation: "let + 人 + 動詞の原形。許可・させてあげるイメージです。" },
      { type: "文法", mode: "choice", q: "「私は兄にパソコンを直してもらった。」に合う英文は？", choices: ["I had my brother fix my computer.", "I let my brother to fix my computer.", "I made my brother fixed my computer.", "I had my brother to fix my computer."], answer: "I had my brother fix my computer.", explanation: "have + 人 + 動詞の原形。お願い・役割としてやってもらうイメージです。" },

      { type: "文法", mode: "choice", q: "The news made me ___ sad.", choices: ["feel", "feels", "to feel", "felt"], answer: "feel", explanation: "make + 人 + feel + 形容詞。「人を〜な気持ちにさせる」です。" },

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function renderModes() {
  const box = document.getElementById("modeList");
  box.innerHTML = "";
  Object.entries(modes).forEach(([id, mode]) => {
    const card = document.createElement("button");
    card.className = "lesson-card";
    card.type = "button";
    card.onclick = () => chooseMode(id);
    card.innerHTML = `
      <div class="lesson-row">
        <div class="lesson-badge">${mode.icon}</div>
        <div>
          <strong>${mode.title}</strong>
        </div>
      </div>
    `;
    box.appendChild(card);
  });
}

function chooseMode(modeId) {
  currentMode = modeId;
  document.getElementById("selectedModeOnlyText").textContent = modes[currentMode].title;
  renderQuestionCounts();
  showScreen("questionCountSelect");
}

function renderQuestionCounts() {
  const box = document.getElementById("questionCountList");
  box.innerHTML = "";
  Object.entries(questionCounts).forEach(([count, setting]) => {
    const card = document.createElement("button");
    card.className = "lesson-card";
    card.type = "button";
    card.onclick = () => chooseQuestionCount(Number(count));
    card.innerHTML = `
      <div class="lesson-row">
        <div class="lesson-badge">${setting.icon}</div>
        <div>
          <strong>${setting.title}</strong>
          <div class="lesson-meta">${setting.theme}<br>${setting.description}</div>
        </div>
      </div>
    `;
    box.appendChild(card);
  });
}

function chooseQuestionCount(count) {
  currentQuestionCount = count;
  document.getElementById("selectedModeText").textContent = `${modes[currentMode].title} / ${currentQuestionCount}問`;
  renderLessons();
  showScreen("lessonSelect");
}

function getQuestionsForMode(lesson) {
  if (currentMode === "vocabulary") {
    return lesson.questions.filter(q => q.type === "単語");
  }
  if (currentMode === "grammar") {
    return lesson.questions.filter(q => q.type === "文法");
  }
  if (currentMode === "reading") {
    return lesson.questions.filter(q => q.type === "本文内容");
  }
  return lesson.questions;
}

function loadStats() {
  const streak = Number(localStorage.getItem("eq_streak") || "0");
  document.getElementById("streakCount").textContent = streak;
  renderHistory();
}

function updateStreak() {
  const today = todayKey();
  const last = localStorage.getItem("eq_lastStudy");
  let streak = Number(localStorage.getItem("eq_streak") || "0");

  if (last !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = yesterday.getFullYear() + "-" + String(yesterday.getMonth()+1).padStart(2,"0") + "-" + String(yesterday.getDate()).padStart(2,"0");
    streak = (last === yKey) ? streak + 1 : 1;
    localStorage.setItem("eq_streak", String(streak));
    localStorage.setItem("eq_lastStudy", today);
  }

  document.getElementById("streakCount").textContent = localStorage.getItem("eq_streak") || "0";
}

function saveHistory(correct, total) {
  const history = JSON.parse(localStorage.getItem("eq_history") || "[]");
  const lesson = lessons[currentLessonId];
  history.unshift({
    date: todayKey(),
    lesson: lesson.title,
    mode: modes[currentMode].title,
    count: total,
    correct,
    total
  });
  localStorage.setItem("eq_history", JSON.stringify(history.slice(0, 8)));
}

  box.innerHTML = history.map(item => `
    <div class="history-item">
      <span>${item.date} / ${item.lesson || "Lesson"} / ${item.mode || "総合問題"} / ${item.count || item.total || 5}問</span>
      <strong>${item.correct}/${item.total}</strong>
    </div>
  `).join("");
}

function startLesson(lessonId) {
  currentLessonId = lessonId;
  const lesson = lessons[currentLessonId];
  const questionSource = getQuestionsForMode(lesson);
  quizQuestions = shuffle(questionSource).slice(0, currentQuestionCount).map(q => ({...q}));
  current = 0;
  score = 0;
  document.getElementById("quizLessonTitle").textContent = `${lesson.title} / ${modes[currentMode].title} / ${quizQuestions.length}問`;
  showScreen("quiz");
  renderQuestion();
}

function restartCurrentLesson() {
  startLesson(currentLessonId);
}

function goHome() {
  showScreen("home");
  loadStats();
}

function backToLessonSelect() {
  renderLessons();
  showScreen("lessonSelect");
}

function renderQuestion() {
  const q = quizQuestions[current];
  selected = null;
  answerWords = [];
  usedIndexes = [];

  document.getElementById("feedback").className = "feedback";
  document.getElementById("checkBtn").disabled = true;
  document.getElementById("hintBox").className = "hint-box";
  document.getElementById("hintBox").textContent = "";
  document.getElementById("hintBtn").disabled = false;
  document.getElementById("progress").style.width = `${(current / quizQuestions.length) * 100}%`;
  document.getElementById("questionType").textContent = q.type;
  document.getElementById("questionText").textContent = q.q;

  const choiceArea = document.getElementById("choiceArea");
  const wordOrderArea = document.getElementById("wordOrderArea");

  if (q.mode === "choice") {
    choiceArea.style.display = "grid";
    wordOrderArea.style.display = "none";
    choiceArea.innerHTML = "";

    shuffle(q.choices).forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.type = "button";
      btn.textContent = choice;
      btn.onclick = () => selectChoice(btn, choice);
      choiceArea.appendChild(btn);
    });
  } else {
    choiceArea.style.display = "none";
    wordOrderArea.style.display = "block";
    q.shuffledWords = shuffle(q.words.map((w, i) => ({w, i})));
    renderWordOrder();
  }
}

function selectChoice(btn, value) {
  selected = value;
  document.querySelectorAll(".choice").forEach(c => c.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("checkBtn").disabled = false;
}

function renderWordOrder() {
  const q = quizQuestions[current];

  document.getElementById("answerBank").innerHTML = "";
  answerWords.forEach((item, idx) => {
    const btn = document.createElement("button");
    btn.className = "word";
    btn.type = "button";
    btn.textContent = item.w;
    btn.onclick = () => removeWord(idx);
    document.getElementById("answerBank").appendChild(btn);
  });

  document.getElementById("wordBank").innerHTML = "";
  q.shuffledWords.forEach(item => {
    if (usedIndexes.includes(item.i)) return;
    const btn = document.createElement("button");
    btn.className = "word";
    btn.type = "button";
    btn.textContent = item.w;
    btn.onclick = () => addWord(item.i);
    document.getElementById("wordBank").appendChild(btn);
  });

  document.getElementById("checkBtn").disabled = answerWords.length !== q.words.length;
}

function addWord(originalIndex) {
  const q = quizQuestions[current];
  const item = q.words.map((w, i) => ({w, i})).find(x => x.i === originalIndex);
  answerWords.push(item);
  usedIndexes.push(originalIndex);
  renderWordOrder();
}

function removeWord(answerIndex) {
  const removed = answerWords.splice(answerIndex, 1)[0];
  usedIndexes = usedIndexes.filter(i => i !== removed.i);
  renderWordOrder();
}

function clearWordOrder() {
  answerWords = [];
  usedIndexes = [];
  renderWordOrder();
}

function normalize(text) {
  return text
    .toLowerCase()
    .replace(/[.!?]+$/g, "")
    .replace(/[,.]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function getHint(q) {
  const text = q.q;
  const answer = String(q.answer || "");

  // 単語：答えそのものではなく、本文の場面・語のイメージだけ出す
  if (q.type === "単語") {
    if (currentLessonId === "lesson3") {
      if (text.includes("意味は？")) {
        return "Lesson 3の単語です。服・気候・伝統衣装・ファッション・自分らしさのどの話題で出てきたかを思い出そう。";
      }
      return "授業プリントの New Words を思い出そう。Part1なら服と気候、Part2ならファッションと自分らしさに関係する語が多いよ。";
    }
    if (text.includes("意味は？")) {
      return "Lesson 4の単語です。コオロギクッキー・昆虫食・宇宙食のどの場面で出てきた語かを思い出そう。";
    }
    return "授業プリントの New Words を思い出そう。Part1なら昆虫食への反応、Part2なら宇宙食としての利点に関係する語が多いよ。";
  }

  // Lesson 3 文法：使役動詞だけ。答えの動詞名を直接出しすぎない。
  if (q.type === "文法" && currentLessonId === "lesson3") {
    if (q.mode === "word_order") {
      return "まず主語を置こう。そのあとに使役動詞、その後ろに「人＋動詞の原形」を続ける。to を入れないのが大事。";
    }

    if (text.includes("誤りを直すなら")) {
      return "使役動詞の後ろの形を確認しよう。「人＋動詞の原形」になっているか、to や過去形が入っていないかを見る。";
    }

    if (text.includes("意味は？")) {
      return "使役動詞のニュアンスを見よう。許可っぽいのか、お願いしてやってもらうのか、強くやらせるのかで意味が変わる。";
    }

    if (text.includes("feel")) {
      return "気持ちを表す文なら「make＋人＋feel＋形容詞」の形を確認しよう。feel の前後に何が来るかがポイント。";
    }

    return "使役動詞は「使役動詞＋人＋動詞の原形」が基本。日本語の『させてあげる・してもらう・させる』のニュアンスを見分けよう。";
  }

  // Lesson 4 文法：受け身＋by/in。答えになる語はなるべく言わない。
  if (q.type === "文法" && currentLessonId === "lesson4") {
    if (q.mode === "word_order") {
      return "まず主語が『する側』か『される側』かを考えよう。受け身なら「主語＋be動詞＋過去分詞」のまとまりを先に作る。";
    }

    if (text.includes("誤りを直すなら")) {
      return "be動詞の後ろが過去分詞になっているか、主語に合ったbe動詞になっているかを確認しよう。";
    }

    if (text.includes("意味は？")) {
      return "英文の主語が『される側』になっていることに注目しよう。文末の by / in は追加情報として読む。";
    }

    if (text.includes("by") || text.includes("in")) {
      return "文末の情報を見よう。『誰がしたか』なら人に注目、『場所・年・言語』ならその情報に注目する。";
    }

    if (text.includes("can")) {
      return "助動詞 can の後ろの形に注意。受け身にしたいときも、can の後ろは原形から始まる。";
    }

    return "受け身は「be動詞＋過去分詞」。主語が『する側』か『される側』かを最初に判断しよう。";
  }

  // 表現：総合問題用。答えの前置詞などを直接言わない。
  if (q.type === "表現") {
    if (text.includes("less") || text.includes("than")) {
      return "比較の文です。than の前に、量が多いのか少ないのかを表す語が入る。本文の比較関係を思い出そう。";
    }
    if (text.includes("made") || text.includes("used") || text.includes("served") || text.includes("cooked")) {
      return "本文に出てきた表現です。受け身の形だけでなく、後ろに続く語句が何を表しているかを考えよう。";
    }
    return "本文中の決まった表現を思い出そう。文法として細かく考えすぎず、フレーズ単位で見ると解きやすい。";
  }

  // 本文内容：答えの内容を言い切らず、探す場所だけ示す
  if (q.type === "本文内容") {
    if (currentLessonId === "lesson3") {
      if (text.includes("Part1") || text.includes("winter") || text.includes("sari") || text.includes("Traditional")) {
        return "Lesson 3 Part1の内容です。服が気候や生活とどう関係しているかに注目しよう。";
      }
      if (text.includes("Part2") || text.includes("Fashion") || text.includes("Stereotype") || text.includes("stereotype")) {
        return "Lesson 3 Part2の内容です。ファッション、自分らしさ、固定観念の流れを思い出そう。";
      }
      return "Lesson 3の本文は、前半が服と気候、後半がファッションと自分らしさ。どちらの話題かを先に判断しよう。";
    }

    if (text.includes("Part1") || text.includes("cookie") || text.includes("Sam") || text.includes("Mana") || text.includes("grasshopper")) {
      return "Lesson 4 Part1の内容です。コオロギクッキーを見たとき、食べた後、昆虫食そのものへの気持ちを分けて考えよう。";
    }

    if (text.includes("Part2") || text.includes("space") || text.includes("astronaut") || text.includes("Mealworms") || text.includes("Challenge")) {
      return "Lesson 4 Part2の内容です。宇宙で食料を育てる条件と、昆虫食の利点に注目しよう。";
    }

    return "Lesson 4の本文は、前半が昆虫食への反応、後半が未来の食料としての利点。どちらの場面かを先に判断しよう。";
  }

  // 並べ替えの一般ヒント
  if (q.mode === "word_order") {
    return "まず主語と動詞のまとまりを作ろう。その後に場所・時・理由などの追加情報をつけると整理しやすい。";
  }

  return "ヒントは答えそのものではなく、見るポイントだけです。問題文のキーワードが授業プリントのどこに出てきたかを思い出そう。";
}

function showHint() {
  const q = quizQuestions[current];
  const box = document.getElementById("hintBox");
  box.textContent = getHint(q);
  box.className = "hint-box show";
}

function checkAnswer() {
  const q = quizQuestions[current];
  let userAnswer = "";

  if (q.mode === "choice") {
    userAnswer = selected;
  } else {
    userAnswer = answerWords.map(x => x.w).join(" ");
  }

  const isCorrect = normalize(userAnswer) === normalize(q.answer);
  if (isCorrect) score++;

  if (q.mode === "choice") {
    document.querySelectorAll(".choice").forEach(btn => {
      if (btn.textContent === q.answer) btn.classList.add("correct");
      if (btn.textContent === userAnswer && !isCorrect) btn.classList.add("wrong");
      btn.disabled = true;
    });
  }

  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (isCorrect ? "correct" : "wrong");
  document.getElementById("feedbackTitle").textContent = isCorrect ? "正解！" : "惜しい！";
  document.getElementById("feedbackText").innerHTML = isCorrect
    ? q.explanation
    : `正解：<strong>${q.answer}</strong><br>${q.explanation}`;

  document.getElementById("checkBtn").disabled = true;
  document.getElementById("hintBtn").disabled = true;
}

function nextQuestion() {
  current++;
  if (current >= quizQuestions.length) {
    finishLesson();
  } else {
    renderQuestion();
  }
}

function finishLesson() {
  updateStreak();
  saveHistory(score, quizQuestions.length);

  const lesson = lessons[currentLessonId];
  document.getElementById("progress").style.width = "100%";
  document.getElementById("resultLessonText").textContent = `${lesson.title} / ${modes[currentMode].title} / ${quizQuestions.length}問 の復習、おつかれさま。`;
  document.getElementById("scoreCircle").textContent = `${score}/${quizQuestions.length}`;
  document.getElementById("correctStat").textContent = `${score}問`;
  document.getElementById("streakStat").textContent = `${localStorage.getItem("eq_streak") || "0"}日`;
  showScreen("result");
}

renderModes();
loadStats();
</script>
